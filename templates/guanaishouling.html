<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>关隘首领</title>

<style>
    body {
        font-family: "Microsoft YaHei", Arial, sans-serif;
        background: #f1f2f6;
        margin: 0;
        padding: 20px;
        color: #2c2c33;
    }

    .container {
        max-width: 1180px;
        margin: 0 auto;
    }

    h1 {
        font-size: 32px;
        margin: 0 0 8px 0;
        color: #222;
        font-weight: 800;
        text-align: center;
    }

    .meta {
        margin-bottom: 24px;
        color: #7a7f99;
        font-size: 16px;
        text-align: center;
    }

    .section {
        margin-bottom: 24px;
    }

    .section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 12px 0;
        color: #222;
        font-size: 22px;
        font-weight: 800;
    }

    .section-title::before {
        content: "";
        display: block;
        width: 5px;
        height: 28px;
        background: #d93939;
        border-radius: 3px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        text-align: left;
    }

    thead {
        background: #d93939;
        color: white;
        font-size: 16px;
    }

    th, td {
        padding: 11px 9px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
        vertical-align: middle;
    }

    tbody tr:nth-child(even) {
        background: #fafafa;
    }

    tbody tr.camp-eren {
        color: #b91c1c;
    }

    tbody tr.camp-haoqi {
        color: #1d4ed8;
    }

    .camp-col,
    .status-col {
        width: 90px;
        text-align: center;
        white-space: nowrap;
        font-weight: 800;
    }

    .castle-col {
        min-width: 120px;
        font-weight: 800;
        color: #333;
        white-space: nowrap;
    }

    tr.camp-eren .castle-col {
        color: #b91c1c;
    }

    tr.camp-haoqi .castle-col {
        color: #1d4ed8;
    }

    .time-col,
    .remain-col {
        min-width: 150px;
        color: #60657a;
        text-align: center;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
    }

    .remain-col {
        color: #d93939;
        font-weight: 800;
    }
</style>
</head>
<body>

<div class="container">
    <h1>关隘首领</h1>
    <div class="meta">更新时间：{{ update_time }}</div>

    {% for group in groups %}
    <div class="section">
        <div class="section-title">{{ group.server }}</div>
        <table>
            <thead>
                <tr>
                    <th>归属</th>
                    <th>关隘名称</th>
                    <th>状态</th>
                    <th>开始时间</th>
                    <th>结束时间</th>
                    <th>剩余时间</th>
                </tr>
            </thead>

            <tbody>
            {% for item in group.records %}
                <tr
                    {% if item.camp_name == '恶人谷' %}
                        class="camp-eren"
                    {% elif item.camp_name == '浩气盟' %}
                        class="camp-haoqi"
                    {% endif %}
                >
                    <td class="camp-col">{{ item.camp_name }}</td>
                    <td class="castle-col">{{ item.castle }}</td>
                    <td class="status-col">{{ item.str_status }}</td>
                    <td class="time-col">{{ item.start_time }}</td>
                    <td class="time-col">{{ item.end_time }}</td>
                    <td class="remain-col">{{ item.remaining_time }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
    {% endfor %}
</div>

</body>
</html>
